<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgroScan | Weather Advisory</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="font-poppins bg-slate-50">

<div id="app"></div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="advisory.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

renderShell(
"Smart Weather Advisory",
"Check current weather, 3-7 day disease risk, and spray window recommendations.",
"from-cyan-900 via-sky-700 to-emerald-700"
)

const pageContent=document.getElementById("pageContent")

pageContent.innerHTML=`

<section class="space-y-6">

<div class="space-y-6">

<div class="rounded-3xl border border-cyan-100 bg-gradient-to-br from-cyan-50 via-white to-emerald-50 p-6 shadow">

<h3 class="text-xl font-semibold">
Check Weather
</h3>

<p class="text-sm text-gray-500 mt-1">
Select or type a location to view weather conditions and farming insights.
</p>


<div class="mt-5 flex gap-2">

<input
id="loc"
list="locationList"
placeholder="Type village / city"
class="w-full rounded-xl border border-cyan-200 bg-white px-4 py-3 shadow-sm focus:border-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-100"
/>

<datalist id="locationList">

<option value="Ongole">
<option value="Guntur">
<option value="Vijayawada">
<option value="Nellore">
<option value="Tirupati">
<option value="Hyderabad">
<option value="Warangal">
<option value="Nizamabad">
<option value="Bangalore">
<option value="Mysuru">
<option value="Mandya">
<option value="Hassan">
<option value="Chennai">
<option value="Coimbatore">
<option value="Madurai">
<option value="Delhi">
<option value="Mumbai">
<option value="Kolkata">
<option value="Pune">
<option value="Ahmedabad">

</datalist>

<button
onclick="detectWeatherLocation()"
class="rounded-xl bg-cyan-700 px-4 py-3 text-white shadow hover:bg-cyan-800"
>
📍
</button>

</div>

<p class="text-xs text-gray-500 mt-2">
Type any location or auto detect
</p>


<button
onclick="getWeather()"
class="mt-4 w-full rounded-xl bg-cyan-700 px-6 py-3 text-white shadow hover:bg-cyan-800"
>
Check Weather
</button>

<div id="weather" class="mt-5"></div>

<div class="mt-4 grid grid-cols-[1fr_auto] gap-2">
  <select id="forecastDays" class="rounded-xl border border-emerald-200 bg-white px-3 py-2 shadow-sm focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-100">
    <option value="3">3 Days</option>
    <option value="4">4 Days</option>
    <option value="5">5 Days</option>
    <option value="6">6 Days</option>
    <option value="7">7 Days</option>
  </select>
  <button
  onclick="getForecastRisk()"
  class="rounded-xl bg-emerald-700 px-4 py-2 text-white shadow hover:bg-emerald-800"
  >
  Forecast Risk
  </button>
</div>

<div id="forecastRisk" class="mt-5"></div>

</div>

</div>

</section>

`

})

</script>

</body>
</html>
