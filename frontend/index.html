<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AgroScan | Crop Scanner</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
fontFamily: {
poppins: ["Poppins","sans-serif"]
}
}
}
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css"/>

</head>


<body class="font-poppins bg-slate-50">

<div id="app"></div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="scan.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

renderShell(
"Smart Crop Disease Scanner",
"Upload a clear crop leaf image, enter location, and get AI-based crop diagnosis.",
"from-emerald-900 via-green-800 to-teal-700"
)

const pageContent=document.getElementById("pageContent")

pageContent.innerHTML=`

<section class="grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">

<div class="rounded-[28px] border border-slate-200 bg-white p-6 md:p-7 shadow-xl">

<div class="flex flex-wrap items-center justify-between gap-3">
  <div>
    <h4 class="text-2xl font-bold text-slate-900">
      Scan Crop Leaf
    </h4>
    <p class="text-sm text-slate-500 mt-1">
      Upload an image, set farm location, and run AI diagnosis.
    </p>
  </div>
  <div class="rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">
    Max file size: 5MB
  </div>
</div>

<div class="mt-6">
  <label
  id="uploadZone"
  for="imageInput"
  class="block rounded-2xl border-2 border-dashed border-emerald-300 bg-emerald-50/40 p-6 text-center cursor-pointer transition duration-200 hover:bg-emerald-50 hover:scale-[1.01]"
  >
  <div class="text-4xl">📸</div>
  <p id="uploadHint" class="mt-2 text-sm text-slate-600">
  Click to upload crop leaf image
  </p>
  <p id="uploadDropHint" class="mt-1 text-xs text-slate-500">
  or drag and drop image here
  </p>

  <input id="imageInput" type="file" accept="image/*" class="hidden"/>

  <img
  id="preview"
  class="mx-auto mt-4 hidden max-h-80 rounded-xl border border-emerald-200 shadow"
  />
  </label>
</div>

<div class="mt-6">
  <label class="text-sm font-medium text-slate-700">
  Farm Location
  </label>

  <div class="mt-2 flex gap-2">
    <input
    id="location"
    list="locationList"
    placeholder="Type village / city"
    class="w-full rounded-xl border border-slate-200 px-4 py-3 shadow-sm focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-100"
    />

    <datalist id="locationList">
    <option value="Ongole">
    <option value="Guntur">
    <option value="Vijayawada">
    <option value="Nellore">
    <option value="Tirupati">
    <option value="Hyderabad">
    <option value="Warangal">
    <option value="Nizamabad">
    <option value="Bangalore">
    <option value="Mysuru">
    <option value="Mandya">
    <option value="Hassan">
    <option value="Chennai">
    <option value="Coimbatore">
    <option value="Madurai">
    <option value="Delhi">
    <option value="Mumbai">
    <option value="Kolkata">
    <option value="Pune">
    <option value="Ahmedabad">
    </datalist>

    <button
    onclick="detectLocation()"
    class="rounded-xl bg-emerald-700 px-4 py-3 text-white shadow hover:bg-emerald-800"
    >
    📍
    </button>
  </div>

  <p class="mt-2 text-xs text-slate-500">
  Type village/city or auto-detect
  </p>
</div>

<div class="mt-6 flex flex-wrap gap-3">
  <button
  id="scanBtn"
  onclick="predict()"
  class="inline-flex items-center gap-2 rounded-xl bg-emerald-700 px-6 py-3 font-medium text-white shadow hover:bg-emerald-800"
  >
  🔍 Scan Crop
  </button>

  <button
  onclick="resetScanForm()"
  class="rounded-xl border border-slate-300 bg-white px-6 py-3 font-medium text-slate-700 hover:bg-slate-100"
  >
  Reset
  </button>
</div>

</div>

<div class="space-y-6 xl:sticky xl:top-24 self-start">
  <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow">
    <h4 class="text-xl font-semibold text-slate-900">Scan Tips</h4>
    <ul class="mt-4 space-y-2 text-sm text-slate-600">
      <li>• Use clear leaf image</li>
      <li>• Avoid blurred photos</li>
      <li>• Focus on diseased area</li>
      <li>• Ensure good lighting</li>
      <li>• Enter correct location</li>
    </ul>
  </div>

  <div class="rounded-3xl border border-emerald-100 bg-emerald-50 p-6 shadow">
    <h4 class="text-xl font-semibold text-emerald-900">What You Get</h4>
    <div class="mt-4 grid gap-2 text-sm">
      <div class="rounded-xl bg-white/80 px-3 py-2">Disease Prediction</div>
      <div class="rounded-xl bg-white/80 px-3 py-2">Detailed Disease Information</div>
      <div class="rounded-xl bg-white/80 px-3 py-2">Step-by-Step Treatment Plan</div>
      <div class="rounded-xl bg-white/80 px-3 py-2">Weather Risk Context + Action Notes</div>
      <div class="rounded-xl bg-white/80 px-3 py-2">Recommended Products + Buy Links</div>
      <div class="rounded-xl bg-white/80 px-3 py-2">Voice Advice</div>
    </div>
  </div>
</div>

</section>

<section class="mt-8">
  <div id="result" class="space-y-6"></div>
</section>

`

initScanPage()

})

</script>

</body>
</html>
