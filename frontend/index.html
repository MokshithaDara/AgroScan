<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AgroScan | Crop Scanner</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
fontFamily: {
poppins: ["Poppins","sans-serif"]
}
}
}
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css"/>

</head>


<body class="font-poppins bg-slate-50">

<div id="app"></div>

<script src="app.js"></script>
<script src="scan.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

renderShell(
"Smart Crop Disease Scanner",
"Upload a clear crop leaf image, enter location, and get AI-based crop diagnosis.",
"from-emerald-900 via-green-800 to-teal-700"
)

const pageContent=document.getElementById("pageContent")

pageContent.innerHTML=`

<section class="grid gap-8 xl:grid-cols-[1.05fr_0.95fr]">

<div class="space-y-8">


<!-- SCANNER CARD -->

<div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-xl">

<h4 class="text-2xl font-bold text-slate-900">
Scan Crop Leaf
</h4>

<p class="text-sm text-slate-500">
Upload crop image and run prediction
</p>


<!-- IMAGE UPLOAD -->

<div class="mt-6">

<label
for="imageInput"
class="block border-2 border-dashed border-emerald-300 rounded-2xl p-6 text-center cursor-pointer hover:bg-emerald-50 transition"
>

<div class="text-4xl">📸</div>
<p class="mt-2 text-sm text-slate-600">
Click to upload crop leaf image
</p>

<input id="imageInput" type="file" accept="image/*" class="hidden"/>

<img
id="preview"
class="mx-auto mt-4 hidden max-h-80 rounded-xl border shadow"
/>

</label>

</div>


<!-- LOCATION + LANGUAGE -->

<div class="mt-6 grid gap-5 md:grid-cols-2">


<div>

<label class="text-sm font-medium text-slate-700">
Farm Location
</label>

<div class="flex gap-2 mt-2">

<input
id="location"
list="locationList"
placeholder="Type village / city"
class="w-full border border-slate-200 rounded-xl px-4 py-3"
/>

<datalist id="locationList">

<option value="Ongole">
<option value="Guntur">
<option value="Vijayawada">
<option value="Nellore">
<option value="Tirupati">
<option value="Hyderabad">
<option value="Warangal">
<option value="Nizamabad">
<option value="Bangalore">
<option value="Mysuru">
<option value="Mandya">
<option value="Hassan">
<option value="Chennai">
<option value="Coimbatore">
<option value="Madurai">
<option value="Delhi">
<option value="Mumbai">
<option value="Kolkata">
<option value="Pune">
<option value="Ahmedabad">

</datalist>

<button
onclick="detectLocation()"
class="px-4 py-3 bg-emerald-700 text-white rounded-xl hover:bg-emerald-800"
>
📍
</button>

</div>

<p class="text-xs text-slate-500 mt-1">
Type village/city or auto-detect
</p>

</div>



<div>

<label class="text-sm font-medium text-slate-700">
Voice Language
</label>

<select
id="language"
class="w-full border border-slate-200 rounded-xl px-4 py-3 mt-2"
>

<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>

</select>

</div>

</div>


<!-- BUTTONS -->

<div class="mt-6 flex gap-4">

<button
id="scanBtn"
onclick="predict()"
class="bg-emerald-700 text-white px-6 py-3 rounded-xl hover:bg-emerald-800 flex items-center gap-2"
>

🔍
Scan Crop

</button>

<button
onclick="resetScanForm()"
class="border border-slate-200 px-6 py-3 rounded-xl hover:bg-slate-100"
>

Reset

</button>

</div>

</div>


<!-- RESULT AREA -->

<div id="result"></div>

</div>


<!-- SIDE PANEL -->

<div class="space-y-8">


<!-- SCAN TIPS -->

<div class="rounded-3xl border border-slate-200 p-6 bg-white shadow">

<h4 class="text-xl font-semibold text-slate-900">
Scan Tips
</h4>

<ul class="mt-4 text-sm text-slate-600 space-y-2">

<li>• Use clear leaf image</li>
<li>• Avoid blurred photos</li>
<li>• Focus on diseased area</li>
<li>• Ensure good lighting</li>
<li>• Enter correct location</li>

</ul>

</div>


<!-- FEATURES -->

<div class="rounded-3xl border border-slate-200 p-6 bg-white shadow">

<h4 class="text-xl font-semibold text-slate-900">
What you get
</h4>

<div class="grid grid-cols-2 gap-4 mt-4 text-sm">

<div class="bg-slate-50 p-3 rounded-xl">Disease Detection</div>

<div class="bg-slate-50 p-3 rounded-xl">Treatment Guidance</div>

<div class="bg-slate-50 p-3 rounded-xl">Weather Snapshot</div>

<div class="bg-slate-50 p-3 rounded-xl">Voice Advice</div>

<div class="bg-slate-50 p-3 rounded-xl">Product Links</div>

</div>

</div>

</div>

</section>

`

initScanPage()

})

</script>

</body>
</html>
