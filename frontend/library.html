<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgroScan | Disease Knowledge Base</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config={
theme:{
extend:{
fontFamily:{poppins:["Poppins","sans-serif"]}
}
}
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="font-poppins bg-slate-50">

<div id="app"></div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="library.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

renderShell(
"Disease Knowledge Base",
"Explore crop diseases detected by AgroScan AI",
"from-emerald-900 via-green-800 to-lime-700"
)

const pageContent=document.getElementById("pageContent")

pageContent.innerHTML=`

<section class="space-y-8">

<div class="bg-white p-6 rounded-3xl shadow border border-slate-200">

<h3 class="text-xl font-semibold text-slate-900">
Crop Disease Library
</h3>

<p class="text-sm text-slate-500 mt-2">
Browse diseases crop-wise detected by AgroScan.
</p>

<input
id="searchInput"
placeholder="Search disease..."
class="mt-4 w-full border rounded-xl px-4 py-3"
/>

</div>

<div id="content"
class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
</div>

</section>

<div id="popup"
class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-2xl shadow-xl w-[420px]">

<h3 id="popupTitle" class="text-xl font-semibold"></h3>

<p id="popupDesc" class="mt-3 text-gray-600"></p>

<p id="popupTreatment" class="mt-4 text-emerald-700 font-medium"></p>

<button onclick="closePopup()"
class="mt-5 bg-emerald-700 text-white px-5 py-2 rounded-lg">
Close
</button>

</div>

</div>

`

renderCrops()
initLibraryInteractions()

})

</script>

</body>
</html>
