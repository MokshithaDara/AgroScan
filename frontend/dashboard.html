<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgroScan | Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config={
theme:{
extend:{
fontFamily:{poppins:["Poppins","sans-serif"]}
}
}
}
</script>

<link rel="stylesheet" href="style.css">

</head>

<body class="font-poppins">

<div id="app"></div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="dashboard.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

renderShell(
"Farm Dashboard",
"View latest scan information and paginated history.",
"from-slate-950 via-emerald-900 to-green-700"
)

const pageContent=document.getElementById("pageContent")

pageContent.innerHTML=`

<section class="space-y-8">

<div class="grid md:grid-cols-2 gap-6">

<div class="rounded-[28px] border border-emerald-100 bg-emerald-50 p-6 shadow">

<p class="text-sm text-emerald-700">
Total Scans
</p>

<p id="totalScans" class="text-3xl font-bold text-emerald-900 mt-2">
0
</p>

</div>


<div class="rounded-[28px] border border-amber-100 bg-amber-50 p-6 shadow">

<p class="text-sm text-amber-700">
Latest Scan
</p>

<p id="latestDisease" class="text-xl font-bold text-amber-900 mt-2">
-
</p>

</div>

</div>



<div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-xl">

<h4 class="text-xl font-semibold text-slate-900">
Recent Scan History
</h4>

<div class="mt-4 flex flex-wrap items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 p-3">
  <button
    id="historyPrevBtn"
    class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100"
  >
    Prev
  </button>

  <input
    id="historyPageSlider"
    type="range"
    min="1"
    max="1"
    value="1"
    class="h-2 w-48 accent-emerald-700"
  />

  <button
    id="historyNextBtn"
    class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100"
  >
    Next
  </button>

  <span id="historyPageInfo" class="text-sm text-slate-600">Page 1 / 1</span>
</div>

<div id="history" class="grid gap-5 md:grid-cols-2 xl:grid-cols-3 mt-6"></div>

</div>

</section>

`

loadHistory()
initHistoryPagination()

})

</script>

</body>
</html>
